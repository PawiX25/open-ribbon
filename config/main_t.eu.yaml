name: vib-ribbon (title) (Europe)
sha1: 7eb79e31da2c7456a1ece52835948b75979ce65a
options:
  # paths
  basename: MAIN_T.EXE
  base_path: ..
  target_path: iso/MAIN_T.EXE

  # compiler
  platform: psx
  compiler: PSYQ

  asm_path: asm/main_t
  src_path: src
  build_path: build
  # create_asm_dependencies: True

  ld_script_path: main_t.exe.ld
  # ld_dependencies: True

  find_file_boundaries: False
  gp_value: 0x80047EB8

  o_as_suffix: True
  use_legacy_include_asm: False

  asm_function_macro: glabel
  asm_jtbl_label_macro: jlabel
  asm_data_macro: dlabel

  section_order: [".rodata", ".text", ".data", ".bss"]
  # auto_link_sections: [".data", ".rodata", ".bss"]

  symbol_addrs_path:
    - symbol_addrs.txt
  reloc_addrs_path:
    - reloc_addrs.txt

  # undefined_funcs_auto_path: undefined_funcs_auto.txt
  # undefined_syms_auto_path: undefined_syms_auto.txt

  extensions_path: tools/splat_ext

  subalign: 2

  string_encoding: ASCII
  data_string_encoding: ASCII
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2
segments:
  - name: header
    type: header
    start: 0x0

  - name: main
    type: code
    start: 0x800
    vram: 0x80019000
    # bss_size: Please fill out this value when you figure out the bss size
    subsegments:
      - [0x800, rodata, 800]
      - [0x4D58, asm, 4D58]
      - [0x2711C, data, 2711C]
      - [0x27158, data, 27158]
  - [0x30000]
